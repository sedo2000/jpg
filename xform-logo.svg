<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- تعريفات التدرجات اللونية الحديثة -->
  <defs>
    <!-- التدرج اللوني لمسار التحويل (من الأزرق للبنفسجي للوردي) -->
    <linearGradient id="pathGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#3B82F6;" />  <!-- أزرق ذكي -->
      <stop offset="50%" style="stop-color:#8B5CF6;" /> <!-- بنفسجي معالج -->
      <stop offset="100%" style="stop-color:#EC4899;" /> <!-- وردي حيوي -->
    </linearGradient>
  </defs>

  <!-- الخلفية الفاتحة والشعاعية (اختيارية، مدمجة لتطابق الصورة) -->
  <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#FFFFFF;" />
    <stop offset="100%" style="stop-color:#F5F5F7;" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="10"/>

  <!-- حاوية العناصر الرسومية المركزية -->
  <g transform="translate(60, 40)">
    
    <!-- 1. المربع (صيغة المدخلات) -->
    <rect x="0" y="10" width="60" height="60" rx="8"
          fill="#3B82F6" 
          stroke="#1D4ED8" 
          stroke-width="1.5" />

    <!-- 2. مسار التحويل المنحني (الانسيابي) -->
    <path d="M 60,40 
             C 100,40 100,60 140,60 
             L 180,60" 
          stroke="url(#pathGradient)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"/>

    <!-- 3. الدائرة (صيغة المخرجات) -->
    <circle cx="210" cy="60" r="28" 
            fill="#EC4899" 
            stroke="#BE185D" 
            stroke-width="1.5" />

    <!-- 4. سهم التحويل الدائري المنقط -->
    <path d="M 110,30 
             C 130,10 170,10 190,30" 
          stroke="#8B5CF6" 
          stroke-width="3" 
          fill="none" 
          stroke-dasharray="8 6" 
          stroke-linecap="round"/>
          
    <!-- رأس السهم -->
    <polygon points="186,28 194,30 192,22" fill="#8B5CF6" />

  </g>

  <!-- حاوية النصوص -->
  <g transform="translate(200, 160)" text-anchor="middle">
    <!-- اسم الموقع: XFORM -->
    <text x="0" y="0" 
          font-family="Arial, sans-serif" 
          font-weight="bold" 
          font-size="60" 
          fill="#333333" 
          letter-spacing="2">
      XFORM
    </text>
    
    <!-- الشعار اللفظي: FILE CONVERSION SERVICES -->
    <text x="0" y="35" 
          font-family="Arial, sans-serif" 
          font-size="16" 
          fill="#666666" 
          letter-spacing="3">
      FILE CONVERSION SERVICES
    </text>
  </g>
</svg>
